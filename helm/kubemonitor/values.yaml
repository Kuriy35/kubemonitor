# Default values for kubemonitor.

replicaCount: 1

image:
  repository: kubemonitor-web
  tag: "1.2.3"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

redis:
  enabled: true
  image: redis:7.0-alpine
  port: 6379

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10

securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  runAsNonRoot: true

trivy:
  enabled: true
  image: aquasec/trivy:0.71.0
  serverPort: 4954
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
